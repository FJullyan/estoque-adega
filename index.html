<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adega - Controle de Estoque</title>
</head>
<body>  
    <nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">🍷 Adega do Kenne</span>
    </div>
</nav>
    <div class="container">   
            <h1>Adega do Kenne</h1>
            <table class="table table-striped mt-4">
    <thead>
        <tr>
            <th>Nome</th>
            <th>Categoria</th>
            <th>Quantidade</th>
            <th>Custo</th>
            <th>Valor de Venda</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody id="tabelaProdutos">
    </tbody>
</table>
    <h2>Cadastrar Produto</h2>
    <form id="formCadastro" class="mt-3">
    <div class="mb-3">
        <label>Nome</label>
        <input type="text" id="nome" class="form-control">
    </div>
    <div class="mb-3">
        <label>Categoria</label>
        <input type="text" id="categoria" class="form-control">
    </div>
    <div class="mb-3">
        <label>Quantidade</label>
        <input type="number" id="quantidade" class="form-control">
    </div>
    <div class="mb-3">
        <label>Custo</label>
        <input type="number" id="custo" class="form-control">
    </div>
    <div class="mb-3">
        <label>Valor de Venda</label>
        <input type="number" id="valor_venda" class="form-control">
    </div>
    <button type="button" class="btn btn-dark" id="btnCadastrar">Cadastrar</button>
</form>
    </div>
    <script src="script.js"></script>
</body>
</html>
